<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PK_EA Trader - ลงทะเบียนสมาชิก</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.3/jquery.min.js" crossorigin="anonymous"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap');
        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            margin: 0;
            padding: 20px 0;
        }
        .register-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px 25px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .logo-img { max-width: 120px; height: auto; margin-bottom: 15px; filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.5)); }
        .form-label { font-size: 0.9rem; color: #a8b2d1; text-align: left; display: block; margin-bottom: 8px; }
        
        .alert-box {
            background-color: rgba(255, 193, 7, 0.15); 
            border-left: 4px solid #ffc107;
            color: #ffdca8;
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 0.85rem;
            text-align: left;
            margin-bottom: 25px;
        }

        .form-control {
            background-color: rgba(0, 0, 0, 0.2) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #ffffff !important;
            border-radius: 10px; padding: 12px;
        }
        .form-control:focus { box-shadow: 0 0 10px rgba(0, 210, 255, 0.5); border-color: #00d2ff !important; }
        .form-control::placeholder { color: rgba(255, 255, 255, 0.4); font-size: 0.85rem; }
        .btn-register {
            background: linear-gradient(to right, #11998e 0%, #38ef7d 100%); 
            border: none; border-radius: 10px; color: white; font-weight: 600; padding: 12px; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(56, 239, 125, 0.4);
        }
        .btn-register:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(56, 239, 125, 0.6); color: white; }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center">
        <div class="register-card text-center">
            
            <img src="https://cdn-icons-png.flaticon.com/512/2633/2633333.png" alt="PK_EA Logo" class="logo-img">
            
            <h3 class="mb-2 fw-bold">ลงทะเบียนสมาชิก</h3>
            
            <div class="alert-box mb-4">
                <i class='bx bxs-info-circle' style='color:#ffc107'></i> 
                <strong>คำแนะนำ:</strong> กรุณาสมัครบัญชีเทรดกับ PU Prime ให้เรียบร้อย ก่อนทำการลงทะเบียนสมาชิก VIP นะคะ
            </div>
            
            <div class="mb-3 text-start">
                <label for="fname" class="form-label"><i class='bx bx-user' style='color:#38ef7d'></i> ชื่อ - นามสกุล</label>
                <input type="text" class="form-control" id="fname" placeholder="กรอกชื่อ นามสกุลจริง">
            </div>

            <div class="mb-3 text-start">
                <label for="email" class="form-label"><i class='bx bx-envelope' style='color:#38ef7d'></i> อีเมล (Email)</label>
                <input type="email" class="form-control" id="email" placeholder="example@gmail.com">
            </div>

            <div class="mb-4 text-start">
                <label for="brokerUid" class="form-label"><i class='bx bx-id-card' style='color:#38ef7d'></i> เลข UID ของคุณ </label>
                <input type="text" class="form-control" id="brokerUid" maxlength="9" placeholder="กรอกเลข UID PU Prime">
            </div>
            
            <div class="text-center mt-4">
                <button type="button" class="btn btn-register w-100 fs-5" id="submit-btn"><i class='bx bx-user-plus'></i> ลงทะเบียนเลย</button>
                <button type="button" class="btn btn-register w-100 fs-5" id="loading-btn" disabled style="display:none;">
                    <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> กำลังบันทึกข้อมูล...
                </button>
            </div>
        </div>
    </div>

<script>
    $(document).ready(() => {
        // อย่าลืมใส่ LIFF ID 
        liff.init({ liffId: '2009651859-yFydAvlN' }); 
        
        $('#submit-btn').click(submitData);
    });

    function submitData() {
        let fname = $('#fname').val().trim();
        let email = $('#email').val().trim();
        let brokerUid = $('#brokerUid').val().trim();

        if(fname === '' || email === '' || brokerUid === '') {
            alert('⚠️ กรุณากรอกข้อมูลให้ครบทุกช่องค่ะ');
            return;
        }

        if (!liff.isLoggedIn()) {
            alert('⚠️ กรุณาเปิดผ่านแอปพลิเคชัน LINE เพื่อบันทึกข้อมูล');
            return;
        }

        $("#submit-btn").hide();
        $("#loading-btn").show();

        let lineUid = liff.getDecodedIDToken().sub; 
        
        const webAppUrl = 'https://script.google.com/macros/s/AKfycbxNoWc_TtwQC21VO3Pjf-3btPaq9Qaw-bDn4KjdpUDm32hgQpEp0v-dm91yeZmxUHPm/exec';

        let payload = {
            opt: 'register_new',
            fname: fname,
            email: email,
            brokerUid: brokerUid,
            lineUid: lineUid
        };

        $.post(webAppUrl, payload, function (res) {
            // 🚨 จุดที่ปรับแก้: เพิ่ม .trim() และโชว์ข้อความ Error จริง
            if (res.trim() === 'success') {
                alert('✅ ลงทะเบียนเรียบร้อยแล้ว แอดมินจะตรวจสอบข้อมูลโดยเร็วที่สุดค่ะ');
                liff.closeWindow(); 
            } else {
                alert('❌ เกิดข้อผิดพลาดจากระบบเซิร์ฟเวอร์:\n' + res);
                $("#submit-btn").show();
                $("#loading-btn").hide();
            }
        }).fail(function() {
            alert('⚠️ ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ได้');
            $("#submit-btn").show();
            $("#loading-btn").hide();
        });
    }
</script>
</body>
</html>
